<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Virtual Tour</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --bg-glass: rgba(15, 23, 42, 0.95);
            --border: rgba(255, 255, 255, 0.12);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Outfit', sans-serif;
        }

        #viewer-container {
            width: 100%;
            height: 100vh;
            background: #000;
        }

        .tour-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10000;
        }

        .tour-header {
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 22px 25px;
            border-radius: 24px;
            color: white;
            max-width: 280px;
            pointer-events: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: left top;
            margin-top: 60px;
            /* Memberi ruang untuk tombol toggle */
        }

        .tour-header.minimized {
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            pointer-events: none;
            filter: blur(10px);
        }

        .toggle-ui-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 48px;
            height: 48px;
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 11000;
            pointer-events: auto;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .toggle-ui-btn:hover {
            background: var(--primary);
            transform: scale(1.1) rotate(5deg);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .toggle-ui-btn i {
            font-size: 1.1rem;
        }

        .tour-header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .tour-header p {
            margin: 4px 0 15px;
            font-size: 9px;
            opacity: 0.5;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: rgba(255, 255, 255, 0.9);
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            pointer-events: auto;
            margin: 0;
        }

        .btn-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action i {
            color: var(--primary);
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }

        .btn-active {
            background: rgba(99, 102, 241, 0.35);
            border-color: var(--primary);
        }

        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
        }

        #modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-body {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            padding: 30px 25px;
            border-radius: 35px;
            max-width: 1000px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: white;
            transform: scale(0.8);
            transition: 0.4s;
            text-align: left;
            position: relative;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .modal-body::-webkit-scrollbar {
            display: none;
        }

        .modal-header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .modal-header-container h2 {
            margin: 0;
            font-size: 24px;
        }

        .modal-text-content {
            margin-top: 20px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            text-align: justify;
        }

        .modal-text-content p {
            margin-top: 0;
            margin-bottom: 1em;
        }

        .tabs-container {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            color: rgba(255, 255, 255, 0.6);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        .tab-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #modal.active .modal-body {
            transform: scale(1);
        }

        .close-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
        }

        .coord-pill {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 10px 25px;
            border-radius: 50px;
            color: #fff;
            font-family: monospace;
            font-size: 13px;
            align-self: flex-start;
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .coord-pill.show {
            opacity: 1;
            visibility: visible;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50000;
            color: white;
            transition: 1s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 25px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .modal-content-wrapper {
            display: flex;
        }

        .modal-content-wrapper.layout-vertical {
            flex-direction: column;
            gap: 20px;
        }

        .modal-content-wrapper.layout-horizontal {
            flex-direction: row;
            gap: 30px;
            align-items: flex-start;
        }

        .modal-pane-3d {
            flex: 1;
            width: 100%;
            display: none;
        }

        .modal-pane-text {
            flex: 1;
            width: 100%;
        }

        #model-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .layout-vertical #model-container {
            height: 450px;
        }

        .layout-horizontal #model-container {
            height: 400px;
        }

        @media (max-width: 768px) {
            .modal-content-wrapper.layout-horizontal {
                flex-direction: column;
                gap: 20px;
            }

            .layout-horizontal #model-container {
                height: 350px;
            }
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --progress-bar-color: var(--primary);
        }

        .layout-toggle-3d {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .layout-toggle-3d:hover {
            color: white;
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .close-modal-icon {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .close-modal-icon:hover {
            color: white;
            background: var(--accent);
            transform: rotate(90deg);
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="font-weight: 300; letter-spacing: 6px; font-size: 0.8rem;">CLEANING UI...</div>
    </div>

    <div id="modal">
        <div class="modal-body">
            <div class="modal-header-container">
                <h2 id="modal-title">Info</h2>
                <div class="close-modal-icon" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="modal-content-wrapper layout-vertical" id="modal-layout-wrapper">
                <div class="modal-pane-3d" id="modal-pane-3d">
                    <div id="model-container">
                        <model-viewer id="obj-viewer" src="" auto-rotate camera-controls shadow-intensity="1"
                            touch-action="pan-y" interaction-prompt="auto" interaction-prompt-style="wiggle"
                            interaction-prompt-threshold="0" loading="eager">
                        </model-viewer>
                        <button class="layout-toggle-3d" onclick="toggleLayout()" title="Ubah Layout Mode"><i class="fas fa-columns"></i></button>
                    </div>
                </div>
                <div class="modal-pane-text">
                    <div class="tabs-container">
                        <div class="tab-buttons">
                            <button id="btn-tab-id" class="tab-btn active" onclick="switchTab('id')">Indonesia</button>
                            <button id="btn-tab-en" class="tab-btn" onclick="switchTab('en')">English</button>
                            <div style="flex-grow: 1;"></div>
                            <button class="tab-btn" id="btn-play" onclick="playNarration()"><i
                                    class="fas fa-volume-up"></i> Teks ke Suara</button>
                            <button class="tab-btn" id="btn-stop" onclick="stopNarration()"
                                style="display: none; background: rgba(244, 63, 94, 0.2); color: #f43f5e; border-color: rgba(244, 63, 94, 0.5);"><i
                                    class="fas fa-stop"></i> Berhenti</button>
                        </div>
                        <div class="modal-text-content tab-content active" id="tab-id"></div>
                        <div class="modal-text-content tab-content" id="tab-en"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="viewer-container"></div>

    <div class="tour-overlay">
        <div id="ui-toggle" class="toggle-ui-btn"><i class="fas fa-bars"></i></div>
        <div class="tour-header" id="main-header">
            <h1 id="scene-title">View Experience</h1>
            <p id="scene-subtitle">LOBBY AREA</p>

            <div class="btn-container">
                <button id="toggle-rotate" class="btn-action btn-active" title="Auto Rotation"><i
                        class="fas fa-sync-alt"></i></button>
                <button id="toggle-markers" class="btn-action btn-active" title="Show Markers"><i
                        class="bi bi-eye-fill"></i></button>
                <button id="toggle-fullscreen" class="btn-action" title="Full Screen"><i
                        class="fas fa-expand"></i></button>
                <button id="toggle-coord" class="btn-action" title="Coordinate Picker"><i
                        class="fas fa-crosshairs"></i></button>
            </div>
        </div>
        <div class="coord-pill" id="coord-display">Ambil kordinat dengan klik ruangan...</div>
    </div>

    <script src="https://pchen66.github.io/js/three/three.min.js"></script>
    <script src="https://pchen66.github.io/js/panolens/panolens.min.js"></script>

    <script>
        const container = document.querySelector('#viewer-container');
        const loader = document.getElementById('loader');
        let viewer; // Global viewer instance

        async function createStyledIcon(iconString, color = '#6366f1', rotation = 0) {
            await document.fonts.ready;
            await new Promise(r => setTimeout(r, 100));
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');

            ctx.beginPath(); ctx.arc(64, 64, 55, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.98)'; ctx.fill();
            ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.stroke();

            ctx.save();
            ctx.translate(64, 64);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.font = '70px "bootstrap-icons"';
            ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(iconString, 0, 0);
            ctx.restore();

            return canvas.toDataURL();
        }

        async function initTour() {
            const infoUrl = await createStyledIcon('\uF431', '#6366f1');
            const arrowUrl = await createStyledIcon('\u2B9D', '#6366f1');
            const arrowLeftUrl = await createStyledIcon('\u2B9D', '#6366f1', -90); // Rotasi ke kiri
            const arrowRightUrl = await createStyledIcon('\u2B9D', '#6366f1', 90); // Rotasi ke kanan

            viewer = new PANOLENS.Viewer({
                container: container,
                autoRotate: true,
                autoRotateSpeed: 0.5,
                controlBar: false,
                cameraFov: 100
            });

            // Invert scroll zoom direction
            const controls = viewer.getControl();
            const originalDollyIn = controls.dollyIn;
            controls.dollyIn = controls.dollyOut;
            controls.dollyOut = originalDollyIn;

            function addBounce(infospot) {
                const startY = infospot.position.y;
                new TWEEN.Tween(infospot.position)
                    .to({ y: startY + 200 }, 1000)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .repeat(Infinity)
                    .yoyo(true)
                    .start();
            }

            function addPulse(infospot) {
                infospot.material.transparent = true;
                infospot.material.opacity = 1;
                new TWEEN.Tween(infospot.material)
                    .to({ opacity: 0.3 }, 1000)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .repeat(Infinity)
                    .yoyo(true)
                    .start();
            }

            const scene1 = new PANOLENS.ImagePanorama('pintu_masuk.JPG');
            const scene2 = new PANOLENS.ImagePanorama('sudut_ruangan.JPG');
            const scene3 = new PANOLENS.ImagePanorama('lantai_dasar.JPG');

            const UNIFORM_SIZE = 500; // Ukuran seragam untuk semua tombol

            const narasiCeramikID = `<p>Anda pastinya sudah tidak asing lagi dengan benda yang satu ini. Keramik, atau dalam Bahasa Yunaninya “keramikos” – memiliki peran yang amat penting dalam setiap lini kehidupan manusia. Sudah sejak masa prasejarah hingga kini, keramik kerap digunakan dalam segala urusan, mulai dari wadah di dapur, hiasan di ruang tamu, sampai pelengkap upacara pada bangunan keagamaan. Sangking berharganya benda ini dalam kehidupan sehari-hari, masyarakat Yunani sampai-sampai memiliki dewa pelindung pembuat keramik yang bernama “Keramos”.</p><p>Keberadaan keramik di Nusantara tentunya tidak dapat terlepas dari perdagangan internasional. Keramik-keramik dari India, Cina, Vietnam, Thailand, Jepang, Timur Tengah, hingga Eropa ditukarkan dengan rempah-rempah. Dari hasil sebaran pecahan-pecahan keramik yang ditemukan, para ahli cenderung beranggapan bahwa keramik yang paling digemari oleh Masyarakat Indonesia adalah yang berasal dari Tiongkok, yaitu yang berbahan dasar porselin.</p><p>Untuk mendapatkan glasir kaca halus nan mengkilap pada keramik porselin, dibutuhkan proses pembakaran yang rumit dengan suhu minimal 1300 derajat. Mulai dari Piring hingga sendok, Periuk sampai kendi, dan tempayan serta celengan, benda-benda ini diproduksi secara masal. Hanya saja, kini posisinya mulai tergantikan dengan adanya produk plastik – yang meskipun tahan lama dan anti pecah, tapi berdampak buruk bagi lingkungan dan penghuninya.</p>`;

            const narasiCeramikEN = `<p>You are certainly no stranger to this object. Ceramics, or in Greek “keramikos” – has played a crucial role in every aspect of human life. From prehistoric times to the present day, ceramics have been widely used for various purposes, ranging from kitchen containers, living room decorations, to ceremonial accessories in religious buildings. Because this object is so valuable in daily life, the Greeks even had a patron god of potters named “Keramos”.</p><p>The existence of ceramics in the Nusantara archipelago is certainly inseparable from international trade. Ceramics from India, China, Vietnam, Thailand, Japan, the Middle East, to Europe were exchanged for spices. Based on the distribution of discovered ceramic shards, experts tend to believe that the ceramics most favored by the Indonesian people were those from China, specifically those made of porcelain.</p><p>To obtain the smooth and shiny glass glaze on porcelain ceramics, a complex firing process at a minimum temperature of 1300 degrees is required. From plates to spoons, pots to pitchers, and jars to piggy banks, these items were mass-produced. However, its position is now beginning to be replaced by plastic products – which, although durable and unbreakable, have a negative impact on the environment and its inhabitants.</p>`;

            // --- Scene 1 Content ---
            const katalog1 = new PANOLENS.Infospot(UNIFORM_SIZE, infoUrl);
            katalog1.position.set(5000, 126, -1676);
            katalog1.addEventListener('click', () => openModal("Katalog Keramik", narasiCeramikID, narasiCeramikEN, "Bench B.glb", "layout-horizontal"));

            const katalog2 = new PANOLENS.Infospot(UNIFORM_SIZE, infoUrl);
            katalog2.position.set(5000, -79, 3296);
            katalog2.addEventListener('click', () => openModal("Katalog 2", "Katalog 2.", "Catalog 2."));

            const area_tunggu = new PANOLENS.Infospot(UNIFORM_SIZE, infoUrl);
            area_tunggu.position.set(-2481, -632, -5000);
            area_tunggu.addEventListener('click', () => openModal("Area tunggu", "Fasilitas ruang tunggu.", "Waiting room facility."));

            const arrow_sudut_ruangan = new PANOLENS.Infospot(UNIFORM_SIZE, arrowLeftUrl);
            arrow_sudut_ruangan.position.set(5000, -1046, -716);
            arrow_sudut_ruangan.addEventListener('click', () => walkToTarget(scene2, arrow_sudut_ruangan.position, "SUDUT RUANGAN", "SUDUT RUANGAN"));

            scene1.add(katalog1, katalog2, area_tunggu, arrow_sudut_ruangan);
            addBounce(katalog1); addBounce(katalog2); addBounce(area_tunggu);
            addPulse(arrow_sudut_ruangan);

            // --- Scene 2 Content ---
            const arrow_pintu_masuk = new PANOLENS.Infospot(UNIFORM_SIZE, arrowRightUrl);
            arrow_pintu_masuk.position.set(2728, -819, -5000);
            arrow_pintu_masuk.addEventListener('click', () => walkToTarget(scene1, arrow_pintu_masuk.position, "PINTU MASUK", "PINTU MASUK"));


            const katalog3 = new PANOLENS.Infospot(UNIFORM_SIZE, infoUrl);
            katalog3.position.set(4570, 36, -5000);
            katalog3.addEventListener('click', () => openModal("Katalog 3", "Katalog 3.", "Catalog 3."));

            const katalog4 = new PANOLENS.Infospot(UNIFORM_SIZE, infoUrl);
            katalog4.position.set(5000, 55, -2320);
            katalog4.addEventListener('click', () => openModal("Katalog 4", "Katalog 4.", "Catalog 4."));

            const arrow_lantai_bawah = new PANOLENS.Infospot(UNIFORM_SIZE, arrowLeftUrl);
            arrow_lantai_bawah.position.set(5000, -1335, 2651);
            arrow_lantai_bawah.addEventListener('click', () => walkToTarget(scene3, arrow_lantai_bawah.position, "LANTAI BAWAH", "LANTAI BAWAH"));

            scene2.add(katalog3, katalog4, arrow_pintu_masuk, arrow_lantai_bawah);
            addBounce(katalog3); addBounce(katalog4);
            addPulse(arrow_pintu_masuk); addPulse(arrow_lantai_bawah);

            // --- Scene 3 Content ---
            const arrow_sudut_ruangan2 = new PANOLENS.Infospot(UNIFORM_SIZE, arrowUrl);
            arrow_sudut_ruangan2.position.set(445, -1179, 5000);
            arrow_sudut_ruangan2.addEventListener('click', () => walkToTarget(scene2, arrow_sudut_ruangan2.position, "SUDUT RUANGAN", "SUDUT RUANGAN"));

            scene3.add(arrow_sudut_ruangan2);
            addPulse(arrow_sudut_ruangan2);

            viewer.add(scene1);

            scene2.addEventListener('enter', () => {
                viewer.tweenControlCenter(new THREE.Vector3(5000, 0, 0), 0);
            });

            scene1.addEventListener('load', () => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);
                scene2.load();
                scene3.load();
            });

            function walkToTarget(pano, targetPosition, title, subtitle) {
                viewer.tweenControlCenter(targetPosition, 500);
                setTimeout(() => {
                    let startFov = viewer.camera.fov;
                    let targetFovIn = 40;
                    let duration = 600;
                    let startTime = Date.now();
                    function zoomIn() {
                        let elapsed = Date.now() - startTime;
                        let progress = Math.min(elapsed / duration, 1);
                        let eased = progress * progress * progress;
                        viewer.camera.fov = startFov + (targetFovIn - startFov) * eased;
                        viewer.camera.updateProjectionMatrix();

                        if (progress < 1) requestAnimationFrame(zoomIn);
                        else {
                            if (!pano.parent) viewer.add(pano);
                            viewer.setPanorama(pano);
                            document.getElementById('scene-title').innerText = title;
                            document.getElementById('scene-subtitle').innerText = subtitle;

                            // Safeguard: re-apply autoRotate state from the internal flag
                            viewer.getControl().autoRotate = viewer.autoRotate;

                            startTime = Date.now();
                            zoomOut();
                        }
                    }
                    function zoomOut() {
                        let elapsed = Date.now() - startTime;
                        let progress = Math.min(elapsed / duration, 1);
                        let eased = 1 - Math.pow(1 - progress, 3);
                        viewer.camera.fov = targetFovIn + (startFov - targetFovIn) * eased;
                        viewer.camera.updateProjectionMatrix();
                        if (progress < 1) requestAnimationFrame(zoomOut);
                    }
                    zoomIn();
                }, 500);
            }



            document.getElementById('toggle-rotate').addEventListener('click', function () {
                const isAutoRotate = !viewer.getControl().autoRotate;
                viewer.getControl().autoRotate = isAutoRotate;
                viewer.autoRotate = isAutoRotate; // Sync Panolens internal flag
                this.classList.toggle('btn-active', isAutoRotate);
            });

            document.getElementById('toggle-fullscreen').addEventListener('click', function () {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    this.classList.add('btn-active');
                } else {
                    document.exitFullscreen();
                    this.classList.remove('btn-active');
                }
            });

            document.getElementById('toggle-markers').addEventListener('click', function () {
                const pano = viewer.panorama;
                const visible = !pano.children[0].visible;
                this.classList.toggle('btn-active', visible);
                pano.children.forEach(c => { if (c instanceof PANOLENS.Infospot) c.visible = visible; });
            });

            document.getElementById('toggle-coord').addEventListener('click', function () {
                const el = document.getElementById('coord-display');
                const show = !el.classList.contains('show');
                el.classList.toggle('show', show);
                this.classList.toggle('btn-active', show);
            });

            document.getElementById('ui-toggle').addEventListener('click', function () {
                const header = document.getElementById('main-header');
                const isMinimized = header.classList.toggle('minimized');
                this.innerHTML = isMinimized ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-times"></i>';
                this.style.background = isMinimized ? 'var(--bg-glass)' : 'var(--accent)';
            });

            viewer.container.addEventListener('click', (e) => {
                if (!document.getElementById('coord-display').classList.contains('show')) return;
                const rect = container.getBoundingClientRect();
                const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, viewer.getCamera());
                const intersects = raycaster.intersectObjects(viewer.getScene().children, true);
                if (intersects.length > 0) {
                    const p = intersects[0].point;
                    document.getElementById('coord-display').innerHTML = `Position: <b>set(${Math.round(p.x)}, ${Math.round(p.y)}, ${Math.round(p.z)})</b>`;
                }
            });
        }
        // --- UI CONTROLS ---
        let currentModalLang = 'id';

        function playNarration() {
            if (!window.responsiveVoice) return;

            let htmlText = document.getElementById('tab-' + currentModalLang).innerHTML;
            let plainText = htmlText.replace(/<[^>]*>?/gm, ''); // hapus tag HTML
            if (!plainText.trim()) return;

            let voice = currentModalLang === 'id' ? "Indonesian Female" : "UK English Female";

            document.getElementById('btn-play').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'inline-block';

            responsiveVoice.speak(plainText, voice, {
                onstart: () => {
                    document.getElementById('btn-play').style.display = 'none';
                    document.getElementById('btn-stop').style.display = 'inline-block';
                },
                onend: () => {
                    document.getElementById('btn-play').style.display = 'inline-block';
                    document.getElementById('btn-stop').style.display = 'none';
                }
            });
        }

        function stopNarration() {
            if (window.responsiveVoice) {
                responsiveVoice.cancel();
            }
            const btnPlay = document.getElementById('btn-play');
            const btnStop = document.getElementById('btn-stop');
            if (btnPlay) btnPlay.style.display = 'inline-block';
            if (btnStop) btnStop.style.display = 'none';
        }

        function switchTab(lang) {
            currentModalLang = lang;
            stopNarration();

            document.getElementById('btn-tab-id').classList.remove('active');
            document.getElementById('btn-tab-en').classList.remove('active');
            document.getElementById('tab-id').classList.remove('active');
            document.getElementById('tab-en').classList.remove('active');

            document.getElementById('btn-tab-' + lang).classList.add('active');
            document.getElementById('tab-' + lang).classList.add('active');
        }

        function toggleLayout() {
            const wrapper = document.getElementById('modal-layout-wrapper');
            if (wrapper) {
                if (wrapper.classList.contains('layout-horizontal')) {
                    wrapper.classList.remove('layout-horizontal');
                    wrapper.classList.add('layout-vertical');
                } else {
                    wrapper.classList.remove('layout-vertical');
                    wrapper.classList.add('layout-horizontal');
                }
            }
        }

        function openModal(title, textId, textEn, modelSrc = null, layoutMode = 'layout-vertical') {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('tab-id').innerHTML = textId || '';
            document.getElementById('tab-en').innerHTML = textEn || textId || '';

            const wrapper = document.getElementById('modal-layout-wrapper');
            if (wrapper) {
                wrapper.className = 'modal-content-wrapper ' + layoutMode;
            }

            switchTab('id');

            const modelContainer = document.getElementById('model-container');
            const modelPane = document.getElementById('modal-pane-3d');
            const modelViewer = document.getElementById('obj-viewer');

            // Pause background rotation (Forcefully disable both flags)
            if (viewer) {
                viewer.autoRotate = false;
                if (viewer.getControl()) viewer.getControl().autoRotate = false;
            }

            if (modelSrc) {
                if (modelPane) modelPane.style.display = 'block';
                if (modelContainer) modelContainer.style.display = 'block';
                setTimeout(() => {
                    if (modelViewer && modelViewer.src !== modelSrc) {
                        modelViewer.src = modelSrc;
                    }
                }, 50);
            } else {
                if (modelPane) modelPane.style.display = 'none';
                if (modelContainer) modelContainer.style.display = 'none';
            }

            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');

            stopNarration();

            // Resume background rotation based on the state of the toggle button
            const isAutoRotateOn = document.getElementById('toggle-rotate').classList.contains('btn-active');
            if (viewer) {
                viewer.autoRotate = isAutoRotateOn;
                if (viewer.getControl()) viewer.getControl().autoRotate = isAutoRotateOn;
            }
        }

        initTour();
    </script>
